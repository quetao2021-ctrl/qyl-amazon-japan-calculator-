teger"},"description":"The relative time in seconds until the current rate-limit window resets.\n"},"Retry-After":{"schema":{"type":"integer"},"description":"The number of seconds to wait until the rate limit window resets. Only sent when the rate limit is reached."}},"parameters":{"Language":{"in":"header","name":"Accept-Language","required":false,"schema":{"$ref":"#\/components\/schemas\/EUOfficialLanguage"}},"Fields":{"in":"query","name":"fields","required":false,"schema":{"type":"string","maxLength":1000},"description":"The `fields` query parameter determines the fields returned with the response payload object.\n\nThe syntax of the query `fields` value is defined by the following [EBNF](https:\/\/en.wikipedia.org\/wiki\/Extended_Backus%E2%80%93Naur_form) grammar.\n```\nfilter = filter-item, {\u0022,\u0022, filter};\nfilter-item = all | field-name | field-name, negation, \u0022(\u0022 field-names \u0022)\u0022 | field-name, \u0022(\u0022, filter-item, {\u0022,\u0022, filter-item}, \u0022)\u0022;\nfield-names = field-name, {\u0022,\u0022, field-name};\nfield-name = {letter-digit}-;\nletter-digit = ? alphanumeric character ?;\nnegation = \u0022!\u0022;\nall = \u0022*\u0022;\n```\n\n**Examples of valid `fields` values:**\n- Return designs root object with only the designNumber field:\u003Cbr\u003E\n```designs(designNumber)```\n\n- Return designs root object with the designNumber field and the nested applicants object with only its\n  identifier field:\u003Cbr\u003E\n```designs(designNumber,applicants(identifier))```\n\n- Return designs root object excluding applicantReference field:\u003Cbr\u003E\n```designs!(applicantReference)```\n\n- Return root object with the `designNumber` field and the nested `applicants` object with all its\nfields but `name`:\u003Cbr\u003E\n```designs(designNumber,applicants!(name))```\n\n- Return root object only with `designNumber` and `status` fields:\u003Cbr\u003E\n```designNumber,status```\n","example":"(designNumber,applicants(identifier)))"},"DesignQuery":{"in":"query","name":"query","required":false,"schema":{"type":"string","maxLength":5000},"description":"The `query` parameter allows to search for a specific set of trademarks using RSQL expressions.\nRSQL is a query language for parametrized filtering of entries in RESTful APIs. It uses an URI-friendly syntax,\nthere are no unsafe characters, so URL encoding is not required.\n\nThe syntax of RQSL is defined by the following [EBNF](https:\/\/en.wikipedia.org\/wiki\/Extended_Backus%E2%80%93Naur_form) grammar.\n```\ninput          = or, EOF;\nor             = and, { \u0022,\u0022 , and };\nand            = constraint, { \u0022;\u0022 , constraint };\nconstraint     = ( group | comparison );\ngroup          = \u0022(\u0022, or, \u0022)\u0022;\n\ncomparison     = selector, comparison-op, arguments;\n\nselector       = unreserved-str;\n\ncomparison-op  = comp-fiql | comp-alt;\ncomp-fiql      = ( ( \u0022=\u0022, { ALPHA } ) | \u0022!\u0022 ), \u0022=\u0022;\ncomp-alt       = ( \u0022\u003E\u0022 | \u0022\u003C\u0022 ), [ \u0022=\u0022 ];\n\narguments      = ( \u0022(\u0022, value, { \u0022,\u0022 , value }, \u0022)\u0022 ) | value;\nvalue          = unreserved-str | double-quoted | single-quoted;\n\nunreserved-str = unreserved, { unreserved }\nsingle-quoted  = \u0022\u0027\u0022, { ( escaped | all-chars - ( \u0022\u0027\u0022 | \u0022\\\u0022 ) ) }, \u0022\u0027\u0022;\ndouble-quoted  = \u0027\u0022\u0027, { ( escaped | all-chars - ( \u0027\u0022\u0027 | \u0022\\\u0022 ) ) }, \u0027\u0022\u0027;\n\nreserved       = \u0027\u0022\u0027 | \u0022\u0027\u0022 | \u0022(\u0022 | \u0022)\u0022 | \u0022;\u0022 | \u0022,\u0022 | \u0022=\u0022 | \u0022!\u0022 | \u0022~\u0022 | \u0022\u003C\u0022 | \u0022\u003E\u0022;\nunreserved     = all-chars - reserved - \u0022 \u0022;\nescaped        = \u0022\\\u0022, all-chars;\nall-chars      = ? all unicode characters ?;\n```\n\n### Available comparison operators\n\n| Operator | Alternative Syntax | Meaning                  |\n|----------|--------------------|--------------------------|\n| ==       |                    | Equal to                 |\n| !=       |                    | Not equal to             |\n| \u003C        | =lt=               | Less than                |\n| \u003C=       | =le=               | Less than or equal       |\n| \u003E        | =gt=               | Greater than operator    |\n| \u003E=       | =ge=               | Greater than or equal to |\n| =in=     |                    | In                       |\n| =out=    |                    | Not in                   |\n| =all=    |                    | All in                   |\n\n*An asterisk can be used as a wildcard with both the equal and not equal operators*\n\n### Available logical operators\n| Operator | Meaning     |\n|----------|-------------|\n| or       | Logical OR  |\n| and      | Logical AND |\n\n### Supported Fields\n| Field                               | Supported operators                        |\n|-------------------------------------|--------------------------------------------|\n| designNumber                        | \u0022==\u0022, \u0022!=\u0022, \u0022=in=\u0022                         |\n| applicantReference                  | \u0022==\u0022, \u0022!=\u0022                                 |\n| verbalElement                       | \u0022==\u0022, \u0022!=\u0022                                 |\n| locarnoClasses                      | \u0022==\u0022, \u0022!=\u0022, \u0022=in=\u0022, \u0022=out=\u0022, \u0022=all=\u0022       |\n| productIndications                  | \u0022==\u0022, \u0022!=\u0022, \u0022=in=\u0022, \u0022=out=\u0022, \u0022=all=\u0022       |\n| applicants.identifier               | \u0022==\u0022, \u0022!=\u0022, \u0022=in=\u0022, \u0022=out=\u0022                |\n| applicants.name                     | \u0022==\u0022, \u0022!=\u0022, \u0022=in=\u0022, \u0022=out=\u0022                |\n| representatives.identifier          | \u0022==\u0022, \u0022!=\u0022, \u0022=in=\u0022, \u0022=out=\u0022                |\n| representatives.name                | \u0022==\u0022, \u0022!=\u0022, \u0022=in=\u0022, \u0022=out=\u0022                |\n| designers.identifier                | \u0022==\u0022, \u0022!=\u0022, \u0022=in=\u0022, \u0022=out=\u0022                |\n| designers.name                      | \u0022==\u0022, \u0022!=\u0022, \u0022=in=\u0022, \u0022=out=\u0022                |\n| applicationDate                     | \u0022==\u0022, \u0022!=\u0022, \u0022\u003C\u0022, \u0022\u003C=\u0022, \u0022\u003E\u0022, \u0022\u003E=\u0022           |\n| registrationDate                    | \u0022==\u0022, \u0022!=\u0022, \u0022\u003C\u0022, \u0022\u003C=\u0022, \u0022\u003E\u0022, \u0022\u003E=\u0022           |\n| expiryDate                          | \u0022==\u0022, \u0022!=\u0022, \u0022\u003C\u0022, \u0022\u003C=\u0022, \u0022\u003E\u0022, \u0022\u003E=\u0022           |\n| status                              | \u0022==\u0022, \u0022!=\u0022, \u0022=in=\u0022, \u0022=out=\u0022                |\n| renewalStatus                       | \u0022==\u0022, \u0022!=\u0022, \u0022=in=\u0022, \u0022=out=\u0022                |\n\n### Examples of valid queries\n- Designs from representative with identifier 28009 which are in status Registered and fully published A.1\n```representatives.identifier==28009 and status==REGISTERED_AND_FULLY_PUBLISHED```\n\n- Registered designs where their locarno classification is 14.04 and are in status Registered and fully published A.1\n```locarnoClasses==14.04 and status==REGISTERED_AND_FULLY_PUBLISHED```\n\n- Designs whose application date is greater than or equal to \u00272023-05-04\u0027\n```applicationDate\u003E=2023-05-04```\n"},"DesignSort":{"in":"query","name":"sort","schema":{"$ref":"#\/components\/schemas\/Sort"},"description":"The sort query parameter determines the sort order. It is the sort field that uses the \u0027:\u0027 separator\nplus the value \u0027asc\u0027 (ascending) or \u
