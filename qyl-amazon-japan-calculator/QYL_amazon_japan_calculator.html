<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QYL 亚马逊日本定价计算器</title>
  <style>
    :root {
      --font: "Microsoft YaHei", "PingFang SC", sans-serif;
      --bg: linear-gradient(135deg, #fff7f1, #f4fbff);
      --text: #2f2b2a;
      --muted: #6d6460;
      --panel: #ffffff;
      --line: #e8ddd6;
      --shadow: 0 16px 42px rgba(96, 66, 45, 0.14);
      --accent: #ff8a5b;
      --accent-2: #1f78d1;
      --btn-main: linear-gradient(120deg, #ff8a5b, #ffb289);
      --btn-main-text: #ffffff;
      --btn-sub: #edf4ff;
      --btn-sub-text: #355575;
      --result-bg: linear-gradient(180deg, #ffffff, #fffdfa);
      --radius-app: 26px;
      --radius-card: 16px;
      --radius-pill: 999px;
    }

    body[data-theme="rabbit"] {
      --font: "Trebuchet MS", "Microsoft YaHei", sans-serif;
      --bg:
        radial-gradient(800px 500px at 10% 10%, rgba(255, 184, 233, 0.35), transparent 50%),
        radial-gradient(900px 600px at 90% 90%, rgba(201, 185, 255, 0.35), transparent 50%),
        linear-gradient(135deg, #fff5fc, #f4f2ff);
      --text: #3f3552;
      --muted: #7a6f91;
      --panel: #fffaff;
      --line: #e4d8ff;
      --shadow: 0 18px 46px rgba(117, 86, 163, 0.17);
      --accent: #c36bff;
      --accent-2: #8b58ff;
      --btn-main: linear-gradient(120deg, #c770ff, #ff8ec8);
      --btn-main-text: #ffffff;
      --btn-sub: #f4eeff;
      --btn-sub-text: #654e9f;
      --result-bg: linear-gradient(180deg, #ffffff, #fcf8ff);
      --radius-app: 34px;
      --radius-card: 24px;
      --radius-pill: 999px;
    }

    body[data-theme="panda"] {
      --font: "Segoe UI", "Microsoft YaHei", sans-serif;
      --bg: linear-gradient(135deg, #f0f0f0, #ffffff);
      --text: #111111;
      --muted: #4e4e4e;
      --panel: #ffffff;
      --line: #1f1f1f;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --accent: #111111;
      --accent-2: #111111;
      --btn-main: #111111;
      --btn-main-text: #ffffff;
      --btn-sub: #efefef;
      --btn-sub-text: #111111;
      --result-bg: #ffffff;
      --radius-app: 10px;
      --radius-card: 8px;
      --radius-pill: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 14px;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      transition: background .25s ease, color .2s ease;
    }

    .app {
      max-width: 1120px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: var(--radius-app);
      background: var(--panel);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: border-radius .2s ease;
    }

    .top {
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: clamp(20px, 2.2vw, 30px);
      line-height: 1.2;
      letter-spacing: .2px;
    }

    .themes {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .theme-btn {
      min-width: 74px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: var(--radius-pill);
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: .16s ease;
      font-family: inherit;
    }

    .theme-btn:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      color: var(--accent);
    }

    .theme-btn.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
      color: var(--accent);
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 12px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      padding: 14px;
      background: var(--panel);
    }

    body[data-theme="rabbit"] .card {
      border-style: dashed;
      border-width: 2px;
    }

    body[data-theme="panda"] .card {
      border-width: 2px;
      border-style: solid;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .row {
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      color: var(--muted);
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      background: #fff;
    }

    .prefix {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    input[type="number"] {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      font-size: 24px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      font-family: inherit;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: var(--radius-pill);
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: .15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-main {
      background: var(--btn-main);
      color: var(--btn-main-text);
    }

    .btn-sub {
      background: var(--btn-sub);
      color: var(--btn-sub-text);
    }

    .formula {
      margin-top: 10px;
      padding: 8px 10px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .history {
      margin-top: 12px;
      border-top: 1px dashed var(--line);
      padding-top: 10px;
    }

    .history-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .history-title {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .history-list {
      max-height: 245px;
      overflow: auto;
      display: grid;
      gap: 8px;
    }

    .history-empty {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      background: #fff;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #fff;
      font-size: 12px;
      line-height: 1.5;
    }

    .history-time {
      color: var(--muted);
      margin-bottom: 4px;
      font-size: 11px;
    }

    .history-use {
      margin-top: 6px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    .result {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 9px;
      background: var(--result-bg);
    }

    .result:last-child {
      margin-bottom: 0;
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
      gap: 8px;
    }

    .result-title {
      color: var(--muted);
      font-size: 12px;
    }

    .result-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
    }

    .result-main .result-value {
      color: var(--accent-2);
    }

    .copy-btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 4px 8px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: .15s ease;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    @media (max-width: 930px) {
      .top {
        justify-content: center;
      }

      .main {
        grid-template-columns: 1fr;
      }

      .result-value {
        font-size: 30px;
      }
    }
  </style>
</head>
<body data-theme="cat">
  <main class="app">
    <header class="top">
      <h1 class="title">QYL 亚马逊日本定价计算器</h1>

      <div class="themes" aria-label="主题切换">
        <button class="theme-btn active" data-theme="cat" type="button">🐱 猫</button>
        <button class="theme-btn" data-theme="rabbit" type="button">🐰 兔</button>
        <button class="theme-btn" data-theme="panda" type="button">🐼 熊猫</button>
      </div>
    </header>

    <section class="main">
      <article class="card">
        <h2>输入</h2>

        <div class="row">
          <label for="purchase">产品采购价格（人民币）</label>
          <div class="input-wrap">
            <span class="prefix">CNY</span>
            <input id="purchase" type="number" min="0" step="0.01" value="30">
          </div>
        </div>

        <div class="row">
          <label for="shipping">中国到日本运费（人民币）</label>
          <div class="input-wrap">
            <span class="prefix">CNY</span>
            <input id="shipping" type="number" min="0" step="0.01" value="12">
          </div>
        </div>

        <div class="row">
          <label for="fx">人民币兑日元汇率</label>
          <div class="input-wrap">
            <span class="prefix">1 CNY =</span>
            <input id="fx" type="number" min="0" step="0.01" value="23">
            <span class="prefix">JPY</span>
          </div>
        </div>

        <div class="actions">
          <button id="calcBtn" class="btn btn-main" type="button">计算并记录</button>
          <button id="resetBtn" class="btn btn-sub" type="button">重置</button>
          <button id="clearHistoryBtn" class="btn btn-sub" type="button">清空记录</button>
        </div>

        <div class="formula">
          活动价（CNY）= （（采购+运费）+（（采购+运费）÷50%）×35%）÷85%<br>
          在 35% / 50% / 85% 这组参数下，可等价简化为：活动价（CNY）= 2 ×（采购+运费）
        </div>

        <div class="history">
          <div class="history-top">
            <div class="history-title">查询记录</div>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>
      </article>

      <article class="card">
        <h2>结果</h2>

        <div class="result result-main">
          <div class="result-head">
            <div class="result-title">活动价（日元）</div>
            <button class="copy-btn" type="button" data-copy="promoJpy">复制</button>
          </div>
          <div class="result-value" id="promoJpy">-</div>
        </div>

        <div class="result">
          <div class="result-head">
            <div class="result-title">日常价（日元）</div>
            <button class="copy-btn" type="button" data-copy="dailyJpy">复制</button>
          </div>
          <div class="result-value" id="dailyJpy">-</div>
        </div>

        <div class="result">
          <div class="result-head">
            <div class="result-title">零售参考价（日元）</div>
            <button class="copy-btn" type="button" data-copy="retailJpy">复制</button>
          </div>
          <div class="result-value" id="retailJpy">-</div>
        </div>

        <div class="result">
          <div class="result-head">
            <div class="result-title">活动价（人民币）</div>
            <button class="copy-btn" type="button" data-copy="promoCny">复制</button>
          </div>
          <div class="result-value" id="promoCny">-</div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const HISTORY_KEY = "qyl_amazon_calc_history_v3";
    const THEME_KEY = "qyl_amazon_calc_theme_v2";
    const MAX_HISTORY = 30;

    const PROFIT_RATE = 0.35;
    const BASE_RATIO = 0.5;
    const FACTOR = 0.85;

    const els = {
      purchase: document.getElementById("purchase"),
      shipping: document.getElementById("shipping"),
      fx: document.getElementById("fx"),
      promoJpy: document.getElementById("promoJpy"),
      dailyJpy: document.getElementById("dailyJpy"),
      retailJpy: document.getElementById("retailJpy"),
      promoCny: document.getElementById("promoCny"),
      calcBtn: document.getElementById("calcBtn"),
      resetBtn: document.getElementById("resetBtn"),
      clearHistoryBtn: document.getElementById("clearHistoryBtn"),
      historyList: document.getElementById("historyList")
    };

    const defaults = { purchase: 30, shipping: 12, fx: 23 };

    function n(v) {
      const x = Number(v);
      return Number.isFinite(x) && x >= 0 ? x : 0;
    }

    function fmtJpy(v) {
      return "JPY " + Math.round(v).toLocaleString("ja-JP");
    }

    function fmtCny(v) {
      return "CNY " + v.toLocaleString("zh-CN", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function calc() {
      const purchase = n(els.purchase.value);
      const shipping = n(els.shipping.value);
      const fx = n(els.fx.value);
      const landedCost = purchase + shipping;

      // 用户给定公式：((成本 + (成本/50%)*35%) / 85%)
      const promoCnyRaw = (landedCost + (landedCost / BASE_RATIO) * PROFIT_RATE) / FACTOR;
      const promoJpyRaw = promoCnyRaw * fx;
      const dailyJpyRaw = promoJpyRaw * 1.2;
      const retailJpyRaw = promoJpyRaw * 1.6;

      return {
        ts: Date.now(),
        purchase,
        shipping,
        fx,
        promoCnyRaw,
        promoJpyRaw,
        dailyJpyRaw,
        retailJpyRaw,
        promoCny: fmtCny(promoCnyRaw),
        promoJpy: fmtJpy(promoJpyRaw),
        dailyJpy: fmtJpy(dailyJpyRaw),
        retailJpy: fmtJpy(retailJpyRaw)
      };
    }

    function renderResult(data) {
      els.promoJpy.textContent = data.promoJpy;
      els.dailyJpy.textContent = data.dailyJpy;
      els.retailJpy.textContent = data.retailJpy;
      els.promoCny.textContent = data.promoCny;
    }

    function loadHistory() {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        const arr = raw ? JSON.parse(raw) : [];
        return Array.isArray(arr) ? arr : [];
      } catch {
        return [];
      }
    }

    function saveHistory(list) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(0, MAX_HISTORY)));
    }

    function toTime(ts) {
      return new Date(ts).toLocaleString("zh-CN", { hour12: false });
    }

    function renderHistory() {
      const list = loadHistory();
      if (!list.length) {
        els.historyList.innerHTML = '<div class="history-empty">暂无记录</div>';
        return;
      }

      els.historyList.innerHTML = list.map(item => `
        <div class="history-item">
          <div class="history-time">${toTime(item.ts)}</div>
          <div>采购 ${item.purchase} / 运费 ${item.shipping} / 汇率 ${item.fx}</div>
          <div>活动 ${item.promoJpy}</div>
          <div>日常 ${item.dailyJpy} / 零售 ${item.retailJpy}</div>
          <button class="history-use" type="button" data-use="${item.ts}">使用这条</button>
        </div>
      `).join("");

      els.historyList.querySelectorAll("[data-use]").forEach(btn => {
        btn.addEventListener("click", () => {
          const ts = Number(btn.getAttribute("data-use"));
          const row = loadHistory().find(x => x.ts === ts);
          if (!row) return;
          els.purchase.value = row.purchase;
          els.shipping.value = row.shipping;
          els.fx.value = row.fx;
          renderResult(calc());
        });
      });
    }

    function addHistory(data) {
      const list = loadHistory();
      list.unshift({
        ts: data.ts,
        purchase: data.purchase,
        shipping: data.shipping,
        fx: data.fx,
        promoJpy: data.promoJpy,
        dailyJpy: data.dailyJpy,
        retailJpy: data.retailJpy
      });
      saveHistory(list);
      renderHistory();
    }

    async function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
    }

    function bindCopyButtons() {
      document.querySelectorAll(".copy-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-copy");
          const target = els[id];
          if (!target) return;

          const text = target.textContent.trim();
          if (!text || text === "-") return;

          const old = btn.textContent;
          try {
            await copyText(text);
            btn.textContent = "已复制";
          } catch {
            btn.textContent = "复制失败";
          }
          setTimeout(() => {
            btn.textContent = old;
          }, 900);
        });
      });
    }

    function setTheme(theme) {
      document.body.setAttribute("data-theme", theme);
      localStorage.setItem(THEME_KEY, theme);

      document.querySelectorAll(".theme-btn").forEach(btn => {
        const isActive = btn.getAttribute("data-theme") === theme;
        btn.classList.toggle("active", isActive);
      });
    }

    function bindThemeButtons() {
      document.querySelectorAll(".theme-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const theme = btn.getAttribute("data-theme");
          if (theme) setTheme(theme);
        });
      });
    }

    function resetInputs() {
      els.purchase.value = defaults.purchase;
      els.shipping.value = defaults.shipping;
      els.fx.value = defaults.fx;
      renderResult(calc());
    }

    ["input", "change"].forEach(evt => {
      els.purchase.addEventListener(evt, () => renderResult(calc()));
      els.shipping.addEventListener(evt, () => renderResult(calc()));
      els.fx.addEventListener(evt, () => renderResult(calc()));
    });

    els.calcBtn.addEventListener("click", () => {
      const data = calc();
      renderResult(data);
      addHistory(data);
    });

    els.resetBtn.addEventListener("click", resetInputs);

    els.clearHistoryBtn.addEventListener("click", () => {
      saveHistory([]);
      renderHistory();
    });

    bindThemeButtons();
    bindCopyButtons();

    const initTheme = localStorage.getItem(THEME_KEY);
    setTheme(["cat", "rabbit", "panda"].includes(initTheme) ? initTheme : "cat");
    renderResult(calc());
    renderHistory();
  </script>
</body>
</html>
